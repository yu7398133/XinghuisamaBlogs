version: "3.8"

services:
  xhblogs-manager:
    # 方式一：使用预构建镜像（推荐，直接拉取）
    image: ghcr.io/yu7398133/xhblogs-manager:latest
    # 方式二：本地构建（取消下面两行注释，注释掉上面的 image 行）
    # build: .
    container_name: xhblogs-manager
    restart: unless-stopped
    ports:
      - "13001:3000"   # 前端管理界面
      - "8019:8019"   # 后端 API
    volumes:
      # 博客前端源码（XHBlogs 目录）
      - ./XHBlogs:/data/blog
      # 管理器数据（草稿等，持久化）
      - manager_data:/data/manager_data
    environment:
      - BACKEND_HOST=0.0.0.0
      - BACKEND_PORT=8019
      - FRONTEND_HOST=0.0.0.0
      - FRONTEND_PORT=3000   # 容器内部端口，外部通过 13001 访问
      - BLOG_PATH=/data/blog
    # 首次启动会自动生成 web_config.json，后续可通过 docker exec 修改：
    # docker exec xhblogs-manager cat /app/web_config.json
    # docker exec -it xhblogs-manager vi /app/web_config.json
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8019/api/status')"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  manager_data:
